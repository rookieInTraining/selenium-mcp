apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: selenium-mcp
  namespace: selenium-mcp
  labels:
    app.kubernetes.io/name: selenium-mcp
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: selenium-mcp
  
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Scale based on memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    
    # Scale based on custom metric (active sessions)
    # Requires Prometheus Adapter
    # - type: Pods
    #   pods:
    #     metric:
    #       name: selenium_sessions_active
    #     target:
    #       type: AverageValue
    #       averageValue: "40"
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max

