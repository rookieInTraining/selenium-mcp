apiVersion: v1
kind: Service
metadata:
  name: selenium-mcp
  namespace: selenium-mcp
  labels:
    app.kubernetes.io/name: selenium-mcp
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: selenium-mcp
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 1800

---
apiVersion: v1
kind: Service
metadata:
  name: selenium-mcp-headless
  namespace: selenium-mcp
  labels:
    app.kubernetes.io/name: selenium-mcp
    app.kubernetes.io/component: headless-service
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: selenium-mcp

