apiVersion: v1
kind: ConfigMap
metadata:
  name: selenium-mcp-config
  namespace: selenium-mcp
  labels:
    app.kubernetes.io/name: selenium-mcp
    app.kubernetes.io/component: config
data:
  # Session Configuration
  SELENIUM_SESSION_MAX_SESSIONS: "50"
  SELENIUM_SESSION_TTL: "15m"
  SELENIUM_SESSION_CLEANUP_INTERVAL: "2m"
  SELENIUM_SESSION_DISTRIBUTED_ENABLED: "true"
  
  # Browser Configuration
  SELENIUM_BROWSER_HEADLESS: "true"
  SELENIUM_BROWSER_WINDOW_WIDTH: "1920"
  SELENIUM_BROWSER_WINDOW_HEIGHT: "1080"
  
  # Rate Limiting
  SELENIUM_RATE_LIMIT_ENABLED: "true"
  SELENIUM_RATE_LIMIT_GLOBAL_RPM: "1000"
  SELENIUM_RATE_LIMIT_SESSION_RPM: "60"
  
  # Java Options
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -XX:+ExitOnOutOfMemoryError"

