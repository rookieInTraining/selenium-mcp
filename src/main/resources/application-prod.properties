# Production Profile Configuration

# Session Configuration
selenium.session.max-sessions=100
selenium.session.distributed-enabled=false

# Browser Configuration - Headless for production
selenium.browser.headless=true

# Rate Limiting - Strict for production
selenium.rate-limit.enabled=true
selenium.rate-limit.global-requests-per-minute=500
selenium.rate-limit.session-requests-per-minute=30

# Logging - Production level
logging.level.com.autom8tr.selenium_mcp=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n

# Actuator - Restricted for production
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized

