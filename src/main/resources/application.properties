# Application Configuration
spring.application.name=selenium-mcp
spring.main.bannerMode=console

# Server Configuration
server.port=7676
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# MCP Server Configuration
spring.ai.mcp.server.name=selenium-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=This server provides Selenium WebDriver tools for browser automation
spring.ai.mcp.server.sse-message-endpoint=/mcp/messages
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=true
spring.ai.mcp.server.capabilities.prompt=true
spring.ai.mcp.server.capabilities.completion=true

# Session Configuration
selenium.session.max-sessions=100
selenium.session.ttl=30m
selenium.session.cleanup-interval=5m
selenium.session.distributed-enabled=false

# Browser Configuration
selenium.browser.default-browser=chrome
selenium.browser.headless=false
selenium.browser.window-width=1920
selenium.browser.window-height=1080
selenium.browser.implicit-wait=10s
selenium.browser.page-load-timeout=30s
selenium.browser.script-timeout=30s

# Rate Limiting
selenium.rate-limit.enabled=true
selenium.rate-limit.global-requests-per-minute=1000
selenium.rate-limit.session-requests-per-minute=60
selenium.rate-limit.session-burst-size=10

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Prometheus Metrics
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Tracing - Disabled by default (enable if you have Zipkin running)
management.tracing.enabled=false
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Logging Configuration
logging.level.com.autom8tr.selenium_mcp=INFO
logging.level.org.springframework.ai=INFO
logging.file.name=./logs/selenium-mcp.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Debug settings (uncomment for debugging)
#logging.level.org.springframework=DEBUG
#logging.level.com.autom8tr.selenium_mcp=DEBUG
#debug=true
