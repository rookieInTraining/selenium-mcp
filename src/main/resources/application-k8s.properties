# Kubernetes Profile Configuration

# Server Configuration
server.port=8080

# Session Configuration - Distributed mode for K8s
selenium.session.max-sessions=50
selenium.session.ttl=15m
selenium.session.cleanup-interval=2m
selenium.session.distributed-enabled=true

# Pod Identity (set via environment variables in K8s)
# selenium.session.pod-id=${HOSTNAME}
# selenium.session.pod-address=${POD_IP}

# Browser Configuration
selenium.browser.headless=true
selenium.browser.window-width=1920
selenium.browser.window-height=1080

# Redis Configuration (set via environment variables)
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2

# Rate Limiting
selenium.rate-limit.enabled=true
selenium.rate-limit.global-requests-per-minute=1000
selenium.rate-limit.session-requests-per-minute=60

# Logging - JSON format for K8s log aggregation
logging.level.com.autom8tr.selenium_mcp=INFO
logging.level.org.springframework=WARN
logging.pattern.console={"timestamp":"%d{ISO8601}","level":"%level","logger":"%logger","thread":"%thread","message":"%msg"}%n

# Actuator for K8s probes
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Zipkin Tracing (optional, set via environment variables)
# management.tracing.sampling.probability=1.0
# management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

