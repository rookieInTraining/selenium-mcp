# Test Profile Configuration

# Session Configuration
selenium.session.max-sessions=5
selenium.session.ttl=5m
selenium.session.cleanup-interval=1m
selenium.session.distributed-enabled=false

# Browser Configuration
selenium.browser.headless=true

# Rate Limiting - Disabled for tests
selenium.rate-limit.enabled=false

# Logging - Minimal for tests
logging.level.com.autom8tr.selenium_mcp=INFO
logging.level.org.springframework=WARN

# Disable Zipkin for tests
management.tracing.enabled=false

